name: pet_crypto
description: "Pet-project Crypto"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  # Log
  logging: ^1.3.0
  # Router
  go_router: ^17.3.0
  # Network
  dio: ^5.10.0
  json_annotation: ^4.12.0
  url_launcher: ^6.3.2
  # DI
  get_it: ^9.2.1
  provider: ^6.1.5+1
  # State Manager
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  equatable: ^2.1.0
  # Storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  build_runner: ^2.15.1
  json_serializable: ^6.14.0
  plugin_platform_interface: ^2.1.8
  url_launcher_platform_interface: ^2.3.2

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
